    /* Container to relative position the icon inside the input */
.search {
  position: relative;
  width: 100%;
  max-width: 350px;
  font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
}

/* The standalone input field */
.search input[type="search"] {
  width: 100%;
  padding: 12px 16px 12px 42px; /* Extra left padding to clear the icon */
  font-size: 16px;
  color: #333333;
  background-color: #f5f5f7;
  border: 1px solid #e5e5ea;
  border-radius: 24px; /* Fully rounded capsule shape */
  outline: none;
  transition: all 0.3s ease;
  box-sizing: border-box;
}

/* Hover state */
.search input[type="search"]:hover {
  background-color: #ededf0;
  border-color: #d1d1d6;
}

/* Focus state: changes background, border color, and adds a subtle glow shadow */
.search input[type="search"]:focus {
  background-color: #ffffff;
  border-color: grey;
  box-shadow: 0 0 0 4px rgba(0, 113, 227, 0.15);
}

/* Magnifying glass icon positioning */
.search-icon {
  position: absolute;
  left: 14px;
  top: 50%;
  transform: translateY(-50%);
  color: #8e8e93;
  pointer-events: none; /* Allows clicks to pass through directly to the input */
  transition: color 0.3s ease;
}

/* Changes icon color when the user focuses on the input field */
.search input[type="search"]:focus + .search-icon {
  color: grey;
}

/* Style configuration for the browser's default clear button ('x') */
.search input[type="search"]::-webkit-search-cancel-button {
  cursor: pointer;
  padding-right: 4px;
}
